<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math & Reading Trivia</title>
    <style>
        /* =========================================================
           CSS STYLES (No External Dependencies)
           Optimized for Mobile, iPad, and Kids!
           ========================================================= */
        :root {
            --bg-color: #f0f8ff;
            --primary-color: #4a90e2;
            --secondary-color: #ff9f43;
            --text-main: #2d3436;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --card-bg: #ffffff;
            --nav-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --btn-shadow: 0 6px 0px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }

        /* Screens */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 20px; text-align: center; }
        .screen.active { display: flex; }

        /* Login Screen */
        #login-screen h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary-color); text-shadow: 2px 2px 0px #fff; }
        .kid-input { font-size: 1.5rem; padding: 15px 20px; border: 3px solid #ccc; border-radius: 20px; width: 100%; max-width: 300px; text-align: center; margin-bottom: 20px; outline: none; transition: border-color 0.2s; }
        .kid-input:focus { border-color: var(--primary-color); }
        
        /* Buttons */
        .btn { font-size: 1.5rem; padding: 15px 30px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; color: white; transition: transform 0.1s, box-shadow 0.1s; box-shadow: var(--btn-shadow); touch-action: manipulation; }
        .btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0px 0px rgba(0,0,0,0.15); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(6px); box-shadow: none; }
        .btn-start { background-color: var(--correct-color); width: 100%; max-width: 300px; box-shadow: 0 6px 0px #27ae60; }
        .btn-next { background-color: var(--primary-color); box-shadow: 0 6px 0px #2980b9; margin-top: 20px; width: 100%; max-width: 400px; display: block; margin-left: auto; margin-right: auto; }

        /* Game Header & Nav */
        header { width: 100%; background: var(--nav-bg); padding: 15px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .header-left { display: flex; align-items: center; font-size: 1.5rem; font-weight: bold; color: var(--primary-color); text-shadow: 1px 1px 0px #eee; }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; font-size: 1.2rem; font-weight: bold; }
        #display-level { font-size: 1.1rem; color: #666; margin-top: 2px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; }
        .tab { flex: 1; max-width: 200px; padding: 12px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: 3px solid transparent; background: #eee; color: #888; transition: all 0.2s; }
        .tab.active { background: var(--primary-color); color: white; border-color: #2980b9; }

        /* Main Game Area */
        .game-container { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; padding: 20px; overflow-y: auto; }
        
        .question-progress-row { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 10px; }
        .question-progress-row .progress-bar-container { flex: 1; margin: 0; background: #e0e0e0; height: 16px; border-radius: 8px; }
        
        .question-number { font-size: 1.4rem; font-weight: bold; color: var(--secondary-color); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: left; padding-left: 10px; }
        .question-card { background: var(--card-bg); padding: 30px 20px; border-radius: 25px; box-shadow: var(--shadow); margin-bottom: 20px; font-size: 2rem; font-weight: bold; text-align: center; border: 4px solid #e0e0e0; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; gap: 20px; } } /* iPad/Desktop layout */

        .option-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; }
        .option-label { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); width: 35px; text-align: center; }
        .option-btn { flex: 1; font-size: 1.5rem; padding: 20px; background-color: white; border: 4px solid #ddd; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--text-main); transition: all 0.1s; position: relative; display: flex; justify-content: space-between; align-items: center; touch-action: manipulation; }
        .option-btn:active:not(:disabled) { transform: scale(0.98); background-color: #f8f8f8; }
        
        /* Answer Feedback States */
        .option-btn.correct { background-color: var(--correct-color); border-color: #27ae60; color: white; }
        .option-btn.wrong { background-color: var(--wrong-color); border-color: #c0392b; color: white; }
        .option-icon { font-size: 1.8rem; line-height: 1; }

        /* Status Bar */
        footer { width: 100%; background: var(--nav-bg); padding: 15px; box-shadow: 0 -4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: bold; }
        .progress-bar-container { flex: 1; margin: 0 20px; background: #ddd; height: 20px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--secondary-color); width: 0%; transition: width 0.3s ease; }

        /* Confetti/End Screen */
        .trophy { font-size: 5rem; margin-bottom: 20px; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 90%; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid var(--primary-color); }
        .modal h2 { margin-bottom: 15px; color: var(--primary-color); font-size: 2rem; }
        .modal p { font-size: 1.3rem; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-small { font-size: 1.2rem; padding: 10px 20px; flex: 1; }
        .btn-primary { background-color: var(--primary-color); box-shadow: 0 6px 0px #2980b9; color: white; }
        .btn-danger { background-color: var(--wrong-color); box-shadow: 0 6px 0px #c0392b; }
        
        .reset-btn { font-size: 0.9rem; padding: 5px 10px; background-color: #e74c3c; color: white; border: none; border-radius: 10px; margin-top: 5px; cursor: pointer; box-shadow: 0 3px 0px #c0392b; font-family: inherit; font-weight: bold; transition: transform 0.1s, box-shadow 0.1s; touch-action: manipulation;}
        .reset-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ==========================================
         HTML DOM STRUCTURE
         ========================================== -->
    <div id="app">
        
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen active">
            <h1>🧠 Math & Reading<br>Trivia ⭐</h1>
            <p style="font-size: 1.2rem; margin-bottom: 20px; color: #666;">Enter your name to play!</p>
            <input type="text" id="player-name" class="kid-input" placeholder="My Name" maxlength="15" autocomplete="off" value="Adit">
            <button class="btn btn-start" onclick="startGame()">Start Game!</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen" style="padding: 0;">
            <header>
                <div class="top-row">
                    <div class="header-left">
                        🧠 Math & Reading
                    </div>
                    <div class="header-right">
                        <span id="display-name">👤 Name</span>
                        <span id="display-level">Level: 1</span>
                        <button class="reset-btn" onclick="promptReset()">🔄 Reset</button>
                    </div>
                </div>
                <div class="nav-tabs">
                    <button class="tab active" id="tab-math" onclick="switchMode('math')">🧮 Math</button>
                    <button class="tab" id="tab-reading" onclick="switchMode('reading')">📚 Reading</button>
                </div>
            </header>

            <div class="game-container">
                <div class="question-progress-row">
                    <span style="font-size: 1.5rem;">⭐</span>
                    <div class="progress-bar-container">
                        <div id="top-level-progress" class="progress-bar-fill"></div>
                    </div>
                    <span style="font-size: 1.5rem;">🏁</span>
                </div>
                <div id="question-number" class="question-number">Question 1 of 10</div>
                <div id="question-text" class="question-card">Question goes here?</div>
                <div id="options-container" class="options-grid">
                    <!-- Options injected by JS -->
                </div>
                <button id="next-btn" class="btn btn-next" disabled onclick="handleNext()">Next Question ➡️</button>
            </div>

            <footer>
                <div style="font-size:1.5rem;">🎯</div>
                <div class="progress-bar-container">
                    <div id="level-progress" class="progress-bar-fill"></div>
                </div>
                <div style="font-size:1.5rem; margin-right: 10px;">🏁</div>
                <div id="score-display">Score: 0/0</div>
            </footer>
        </div>

        <!-- MODALS -->
        <div id="modal-overlay" class="modal-overlay">
            <!-- Reset Confirmation -->
            <div id="reset-modal" class="modal hidden">
                <h2>Are you sure?</h2>
                <p>Do you want to reset all your progress and start over?</p>
                <div class="modal-btns">
                    <button class="btn btn-small" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-small btn-danger" onclick="confirmReset()">Yes, Reset</button>
                </div>
            </div>
            
            <!-- Section Complete -->
            <div id="complete-modal" class="modal hidden">
                <h2 id="complete-title">🎉 Section Complete!</h2>
                <p id="complete-stats">You got XX% correct!</p>
                <div class="modal-btns">
                    <button id="modal-next-btn" class="btn btn-small btn-primary" onclick="closeModal()">Continue</button>
                </div>
            </div>
        </div>

    </div>

            { word: "Assign", distractors: ["Asign", "Assine", "Asigne"] },
            { word: "Assignment", distractors: ["Asignment", "Assinment", "Assingment"] },
            { word: "Assist", distractors: ["Asist", "Assest", "Asusist"] },
            { word: "Assistance", distractors: ["Asistance", "Assistence", "Assistense"] },
            { word: "Assistant", distractors: ["Asistant", "Assistent", "Assissant"] },
            { word: "Associate", distractors: ["Asociate", "Assosiate", "Associat"] },
            { word: "Association", distractors: ["Asociation", "Assosiation", "Assocciaton"] },
            { word: "Assumption", distractors: ["Asumption", "Assumsion", "Assomption"] },
            { word: "Assurance", distractors: ["Asurance", "Assurence", "Assurense"] },
            { word: "Assure", distractors: ["Asure", "Ashure", "Assur"] },
            { word: "Astonish", distractors: ["Astoneish", "Estonish", "Astonnish"] },
            { word: "Athlete", distractors: ["Athelete", "Athleet", "Athleet"] },
            { word: "Athletic", distractors: ["Atheletic", "Athletik", "Athleitc"] },
            { word: "Atmosphere", distractors: ["Atmosfere", "Atmosfear", "Atmosfer"] },
            { word: "Attach", distractors: ["Atach", "Attache", "Attatch"] },
            { word: "Attachment", distractors: ["Atachment", "Attachement", "Attatchment"] },
            { word: "Attendance", distractors: ["Atendance", "Attendence", "Attendense"] },
            { word: "Attention", distractors: ["Atention", "Attension", "Attenshun"] },
            { word: "Attorney", distractors: ["Atorney", "Attourney", "Atourney"] },
            { word: "Attract", distractors: ["Atract", "Attrack", "Atrak"] },
            { word: "Attraction", distractors: ["Atraction", "Attrakion", "Attracksion"] },
            { word: "Attractive", distractors: ["Atractive", "Attractiv", "Atractiv"] },
            { word: "Audience", distractors: ["Audiance", "Audiense", "Awdeince"] },
            { word: "August", distractors: ["Augest", "Augast", "Ougust"] },
            { word: "Authority", distractors: ["Authoraty", "Authourity", "Authoritee"] },
            { word: "Automatic", distractors: ["Autometic", "Ottomatic", "Automadic"] },
            { word: "Automobile", distractors: ["Autamobile", "Ottomobile", "Automobil"] }
          ]
        };

        /**
         * 2. GAME STATE
         */
        let state = {
            playerName: "Adit",
            activeMode: "math",
            math: { level: 1, questionIndex: 0, completed: false, answered: 0, correct: 0 },
            reading: { level: 1, questionIndex: 0, currentLevelWords: [], completed: false, answered: 0, correct: 0 },
            isAnswered: false,
            currentAnswerIndex: -1 
        };

        /**
         * 3. HELPER FUNCTIONS
         */
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        const shuffle = (array) => {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const generateMathDistractors = (correctAnswer) => {
            let distractors = new Set();
            while(distractors.size < 3) {
                let offset = rand(-5, 5);
                if (offset === 0) offset = rand(1, 3);
                let distractor = correctAnswer + offset;
                if (distractor >= 0 && distractor !== correctAnswer) {
                    distractors.add(distractor);
                }
            }
            return Array.from(distractors);
        };

        /**
         * 4. PROCEDURAL GENERATORS
         */
        function generateMathQuestionData(level) {
            let n1, n2, n3, correctAnswer, questionText;

            switch(level) {
                case 1: 
                    n1 = rand(1, 8); n2 = rand(1, 9 - n1); 
                    correctAnswer = n1 + n2; questionText = `${n1} + ${n2} = ?`;
                    break;
                case 2: 
                    n1 = rand(10, 49); n2 = rand(10, 49);
                    correctAnswer = n1 + n2; questionText = `${n1} + ${n2} = ?`;
                    break;
                case 3: 
                    n1 = rand(50, 99); n2 = rand(50, 99);
                    correctAnswer = n1 + n2; questionText = `${n1} + ${n2} = ?`;
                    break;
                case 4: 
                    n1 = rand(1, 5); n2 = rand(1, 4); n3 = rand(1, 9 - (n1+n2));
                    if(n1+n2+n3 > 9) n3 = 1; 
                    correctAnswer = n1 + n2 + n3; questionText = `${n1} + ${n2} + ${n3} = ?`;
                    break;
                case 5: 
                    n1 = rand(10, 49); n2 = rand(10, 49); n3 = rand(10, 49);
                    correctAnswer = n1 + n2 + n3; questionText = `${n1} + ${n2} + ${n3} = ?`;
                    break;
                case 6: 
                    n1 = rand(50, 99); n2 = rand(50, 99); n3 = rand(50, 99);
                    correctAnswer = n1 + n2 + n3; questionText = `${n1} + ${n2} + ${n3} = ?`;
                    break;
                case 7: 
                    n1 = rand(2, 9); n2 = rand(1, n1 - 1);
                    correctAnswer = n1 - n2; questionText = `${n1} - ${n2} = ?`;
                    break;
                case 8: 
                    n1 = rand(12, 49); n2 = rand(11, n1 - 1);
                    correctAnswer = n1 - n2; questionText = `${n1} - ${n2} = ?`;
                    break;
                case 9: 
                    n1 = rand(52, 99); n2 = rand(51, n1 - 1);
                    correctAnswer = n1 - n2; questionText = `${n1} - ${n2} = ?`;
                    break;
                case 10: 
                    n1 = rand(2, 9); n2 = rand(1, 9);
                    let sum = n1 + n2;
                    n3 = rand(1, Math.min(9, sum - 1));
                    correctAnswer = n1 + n2 - n3; questionText = `${n1} + ${n2} - ${n3} = ?`;
                    break;
                default:
                    n1 = rand(1, 5); n2 = rand(1, 5);
                    correctAnswer = n1 + n2; questionText = `${n1} + ${n2} = ?`;
            }

            let distractors = generateMathDistractors(correctAnswer);
            let options = shuffle([correctAnswer, ...distractors]);

            return {
                question: questionText,
                options: options.map(String),
                answerIndex: options.indexOf(correctAnswer)
            };
        }

        function prepareReadingLevel(level) {
            const levelKey = `level${level}`;
            const fullPool = spellingGameData[levelKey] || spellingGameData.level1;
            let shuffledPool = shuffle(fullPool);
            state.reading.currentLevelWords = shuffledPool.slice(0, CONFIG.QUESTIONS_PER_LEVEL);
        }

        function getReadingQuestionData(wordObj) {
            let options = shuffle([wordObj.word, ...wordObj.distractors]);
            return {
                question: "Choose the word with the correct spelling:",
                options: options,
                answerIndex: options.indexOf(wordObj.word)
            };
        }

        /**
         * 5. CORE GAME LOOP & RENDERING
         */
        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (nameInput) state.playerName = nameInput;
            
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-name').innerText = `👤 ${state.playerName}`;
            
            prepareReadingLevel(1);
            renderQuestion();
        }

        function switchMode(mode) {
            state.activeMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            renderQuestion();
        }

        function renderQuestion() {
            const modeState = state[state.activeMode];
            const maxLevel = state.activeMode === 'math' ? CONFIG.MAX_MATH_LEVEL : CONFIG.MAX_READING_LEVEL;

            if (modeState.completed) {
                showSectionComplete();
                return;
            }

            document.getElementById('display-level').innerText = `Level: ${modeState.level}`;
            document.getElementById('next-btn').disabled = true;
            state.isAnswered = false;

            let qData;
            if (state.activeMode === 'math') {
                qData = generateMathQuestionData(modeState.level);
            } else {
                const wordObj = state.reading.currentLevelWords[modeState.questionIndex];
                qData = getReadingQuestionData(wordObj);
            }

            document.getElementById('question-number').innerText = `Question ${modeState.questionIndex + 1} of ${CONFIG.QUESTIONS_PER_LEVEL}`;
            document.getElementById('question-text').innerText = qData.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'option-wrapper';

                const label = document.createElement('div');
                label.className = 'option-label';
                label.innerText = String.fromCharCode(65 + idx); // Generates A, B, C, D

                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleOptionClick(btn, idx, qData.answerIndex);
                
                wrapper.appendChild(label);
                wrapper.appendChild(btn);
                optionsContainer.appendChild(wrapper);
            });
            
            updateProgress();
        }

        function handleOptionClick(btn, selectedIdx, correctIdx) {
            if (state.isAnswered) return;
            state.isAnswered = true;
            state[state.activeMode].answered++;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                btn.innerHTML += ' <span class="option-icon">✅</span>';
                state[state.activeMode].correct++;
            } else {
                btn.classList.add('wrong');
                btn.innerHTML += ' <span class="option-icon">❌</span>';
                buttons[correctIdx].classList.add('correct');
                buttons[correctIdx].innerHTML += ' <span class="option-icon">✅</span>';
            }

            buttons.forEach(b => b.disabled = true);
            document.getElementById('next-btn').disabled = false;
            updateProgress();
        }

        function handleNext() {
            const modeState = state[state.activeMode];
            modeState.questionIndex++;

            if (modeState.questionIndex >= CONFIG.QUESTIONS_PER_LEVEL) {
                modeState.level++;
                modeState.questionIndex = 0;
                
                const maxLevel = state.activeMode === 'math' ? CONFIG.MAX_MATH_LEVEL : CONFIG.MAX_READING_LEVEL;
                
                if (modeState.level > maxLevel) {
                    modeState.completed = true;
                    showSectionComplete();
                    return;
                }
                
                if (state.activeMode === 'reading' && modeState.level <= CONFIG.MAX_READING_LEVEL) {
                    prepareReadingLevel(modeState.level);
                }
            }
            
            renderQuestion();
        }

        function updateProgress() {
            const modeState = state[state.activeMode];
            const progressPercent = (modeState.questionIndex / CONFIG.QUESTIONS_PER_LEVEL) * 100;
            const topProgressPercent = ((modeState.questionIndex + 1) / CONFIG.QUESTIONS_PER_LEVEL) * 100;
            
            document.getElementById('level-progress').style.width = `${progressPercent}%`;
            document.getElementById('top-level-progress').style.width = `${topProgressPercent}%`;
            document.getElementById('score-display').innerText = `Score: ${modeState.correct}/${modeState.answered}`;
        }

        /* MODAL & RESET LOGIC */
        function promptReset() {
            document.getElementById('reset-modal').classList.remove('hidden');
            document.getElementById('complete-modal').classList.add('hidden');
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function confirmReset() {
            closeModal();
            resetApp();
        }

        function showSectionComplete() {
            const modeState = state[state.activeMode];
            let sectionPercent = modeState.answered > 0 ? Math.round((modeState.correct / modeState.answered) * 100) : 0;
            
            let statsText = `You answered <strong>${sectionPercent}%</strong> correctly in this section!<br><br>Section Score:<br><strong>${modeState.correct} / ${modeState.answered}</strong>`;

            let nextBtn = document.getElementById('modal-next-btn');
            
            if (state.math.completed && state.reading.completed) {
                let totalCorrect = state.math.correct + state.reading.correct;
                let totalAnswered = state.math.answered + state.reading.answered;
                let totalPercent = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
                
                document.getElementById('complete-title').innerText = "🏆 All Done!";
                statsText = `Amazing job, ${state.playerName}!<br><br>` + 
                            `Current Section: <strong>${modeState.correct}/${modeState.answered} (${sectionPercent}%)</strong><br>` +
                            `Overall Total: <strong>${totalCorrect}/${totalAnswered} (${totalPercent}%)</strong>`;
                document.getElementById('complete-stats').innerHTML = statsText;
                nextBtn.innerText = "Restart Game";
                nextBtn.onclick = confirmReset;
            } else {
                document.getElementById('complete-title').innerText = "🎉 Section Complete!";
                document.getElementById('complete-stats').innerHTML = statsText;
                let otherMode = state.activeMode === 'math' ? 'reading' : 'math';
                nextBtn.innerText = `Go to ${otherMode.charAt(0).toUpperCase() + otherMode.slice(1)}`;
                nextBtn.onclick = () => {
                    closeModal();
                    switchMode(otherMode);
                };
            }

            document.getElementById('reset-modal').classList.add('hidden');
            document.getElementById('complete-modal').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.add('active');
        }

        function resetApp() {
            state.math.level = 1;
            state.math.questionIndex = 0;
            state.math.completed = false;
            state.math.answered = 0;
            state.math.correct = 0;
            
            state.reading.level = 1;
            state.reading.questionIndex = 0;
            state.reading.completed = false;
            state.reading.answered = 0;
            state.reading.correct = 0;
            
            prepareReadingLevel(1);
            switchMode('math'); // Will auto-render question and switch tab visual
        }
    </script>
